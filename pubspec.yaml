name: node_management_app
description: "NodeOps — Multi-node Inventory Management System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^15.1.2

  # Network
  dio: ^5.8.0+1

  # Secure Storage
  flutter_secure_storage: ^9.2.4

  # Environment variables
  flutter_dotenv: ^5.2.1

  # File Picker
  file_picker: ^8.1.7

  # Typography
  google_fonts: ^6.2.1
  url_launcher: ^6.3.2
  syncfusion_flutter_pdfviewer: ^33.2.13
  image_picker: ^1.2.3
  pdf: ^3.12.0
  path_provider: ^2.1.6
  mobile_scanner: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
